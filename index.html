/* ============================== HELPERS ============================== */
const STORAGE_KEY = 'workout-logs';
async function loadLogs() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw)
            return JSON.parse(raw);
        return {};
    }
    catch (e) {
        return {};
    }
}
async function saveLogs(logs) {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(logs));
    }
    catch (e) {
        throw new Error('save failed');
    }
}
function exerciseKey(planId, sessionId, order) {
    return `${planId}__${sessionId}__${order}`;
}
function todayISO() {
    const d = new Date();
    const off = d.getTimezoneOffset();
    const local = new Date(d.getTime() - off * 60000);
    return local.toISOString().slice(0, 10);
}
function formatDateShort(iso) {
    if (!iso)
        return '';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function formatDateHeader(iso) {
    if (!iso)
        return '';
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString('en-US', { day: '2-digit', month: 'short', year: 'numeric' });
}
function formatRest(r) {
    const s = String(r);
    if (s === '0')
        return 'superset · 0 min';
    if (/^[\d.]+(-[\d.]+)?$/.test(s))
        return `${s} min`;
    return s;
}
function formatTargetReps(reps) {
    const s = String(reps).trim();
    let m = s.match(/^(\d+)\s*,\s*(\d+)(.*)$/);
    if (m)
        return `${m[1]}–${m[2]}${m[3].trim() ? ' ' + m[3].trim() : ''} reps`;
    m = s.match(/^(\d+)\s*-\s*(\d+)(.*)$/);
    if (m)
        return `${m[1]}–${m[2]}${m[3].trim() ? ' ' + m[3].trim() : ''} reps`;
    return `${s} reps`;
}
function parseSetsCount(sets) {
    const s = String(sets);
    const m = s.match(/(\d+)/g);
    if (!m)
        return 1;
    return parseInt(m[0], 10);
}

/* ---------- muscle group classification ---------- */
const MUSCLE_META = {
    chest: { label: 'Chest', view: 'front' },
    shoulders: { label: 'Shoulders', view: 'front' },
    biceps: { label: 'Biceps', view: 'front' },
    core: { label: 'Core', view: 'front' },
    quads: { label: 'Quads', view: 'front' },
    back: { label: 'Back', view: 'back' },
    triceps: { label: 'Triceps', view: 'back' },
    glutes: { label: 'Glutes', view: 'back' },
    hamstrings: { label: 'Hamstrings', view: 'back' },
    calves: { label: 'Calves', view: 'back' },
};
const MUSCLE_RULES = [
    { test: /push-?up|bench press|chest press|\bdip\b/i, muscles: ['chest', 'triceps', 'shoulders'] },
    { test: /row|pull-?up|pulldown|pull from|lat pulldown|horizontal pull/i, muscles: ['back', 'biceps'] },
    { test: /bicep|hammer grip/i, muscles: ['biceps'] },
    { test: /tricep|kick back|french push|leverage/i, muscles: ['triceps'] },
    { test: /lateral raise|overhead|face pull|shoulder/i, muscles: ['shoulders'] },
    { test: /squat|lunge|step up|step squat|hack squat|leg press|diagonal press|incline press 1 leg/i, muscles: ['quads', 'glutes'] },
    { test: /deadlift|good morning|hip lift|hip thrust|hip raise/i, muscles: ['hamstrings', 'glutes', 'back'] },
    { test: /hip extension|hip abduction/i, muscles: ['glutes'] },
    { test: /knee flexion|hamstring/i, muscles: ['hamstrings'] },
    { test: /knee extension/i, muscles: ['quads'] },
    { test: /calf|heel raise|toe raise/i, muscles: ['calves'] },
    { test: /plank|crunch|dead ?bug|rotation|leg raise|core|bird dog/i, muscles: ['core'] },
    { test: /upper back|back activation/i, muscles: ['back', 'core'] },
    { test: /burpee/i, muscles: ['core', 'quads', 'chest'] },
];
function classifyMuscles(name) {
    const found = new Set();
    MUSCLE_RULES.forEach((rule) => {
        if (rule.test.test(name))
            rule.muscles.forEach((m) => found.add(m));
    });
    return Array.from(found);
}
function splitMusclesByView(name) {
    const muscles = classifyMuscles(name);
    const front = muscles.filter((m) => MUSCLE_META[m] && MUSCLE_META[m].view === 'front');
    const back = muscles.filter((m) => MUSCLE_META[m] && MUSCLE_META[m].view === 'back');
    return { front, back, all: muscles };
}
/* ---------- history calendar helpers ---------- */
function getMonthMatrix(year, month) {
    const firstDay = new Date(year, month, 1);
    const startWeekday = firstDay.getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < startWeekday; i++)
        cells.push(null);
    for (let d = 1; d <= daysInMonth; d++)
        cells.push(d);
    while (cells.length % 7 !== 0)
        cells.push(null);
    return cells;
}
function isoDate(year, month, day) {
    const mm = String(month + 1).padStart(2, '0');
    const dd = String(day).padStart(2, '0');

}
function formatMonthYear(iso) {

    let max = null;
    plan.sessions.forEach((s) => {
        s.exercises.forEach((e) => {
            const key = exerciseKey(plan.id, s.id, e.order);
            const arr = logs[key] || [];
            arr.forEach((entry) => {
                if (!min || entry.date < min)
                    min = entry.date;
                if (!max || entry.date > max)
                    max = entry.date;

        });
    });
    return { min, max };
}

function hexToRgb(hex) {
    const v = hex.replace('#', '');
    return [parseInt(v.slice(0, 2), 16), parseInt(v.slice(2, 4), 16), parseInt(v.slice(4, 6), 16)];
}
function rgbToHex(r, g, b) {
    return '#' + [r, g, b].map((x) => Math.round(Math.max(0, Math.min(255, x))).toString(16).padStart(2, '0')).join('');
}
function lerpColor(c1, c2, t) {
    const a = hexToRgb(c1);
    const b = hexToRgb(c2);
    return rgbToHex(a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t);
}
function loadColor(pct) {
    if (!pct || pct <= 0)
        return '#3A5A82';
    if (pct < 0.5)
        return lerpColor('#3A5A82', '#FF8A5C', pct / 0.5);
    return lerpColor('#FF8A5C', '#E0667A', (pct - 0.5) / 0.5);
}
function getAllPlans() {
    return [HOME_PLAN, ...GYM_PLANS];
}
function getMuscleLoadTotals(logs) {
    const totals = {};
    getAllPlans().forEach((plan) => {
        plan.sessions.forEach((session) => {
            session.exercises.forEach((ex) => {
                const muscles = classifyMuscles(ex.name);
                if (muscles.length === 0)
                    return;
                const key = exerciseKey(plan.id, session.id, ex.order);
                const entries = logs[key] || [];
                let setCount = 0;
                entries.forEach((entry) => { setCount += entry.sets ? entry.sets.length : 0; });
                if (setCount === 0)
                    return;
                muscles.forEach((m) => { totals[m] = (totals[m] || 0) + setCount; });
            });
        });
    });
    return totals;
}
function getMuscleLoadRanked(logs) {
    const totals = getMuscleLoadTotals(logs);
    const max = Math.max(0, ...Object.values(totals));
    const allMuscles = Object.keys(MUSCLE_META);
    const ranked = allMuscles.map((m) => ({
        key: m,
        label: MUSCLE_META[m].label,
        sets: totals[m] || 0,
        pct: max > 0 ? (totals[m] || 0) / max : 0,
        score: max > 0 ? ((totals[m] || 0) / max) * 10 : 0,
    }));
    ranked.sort((a, b) => b.sets - a.sets);
    return ranked;
}
function getSessionDatesMap(planId, session, logs) {
    const map = {};
    session.exercises.forEach((e) => {
        const hist = getRealHistory(planId, session.id, e, logs);
        hist.forEach((h) => {
            if (!map[h.date])
                map[h.date] = [];
            map[h.date].push({ order: e.order, name: e.name, sets: h.sets });
        });
    });
    return map;
}

.superset-group {
  border: 1px solid var(--border-soft); border-left: 3px solid var(--amber); border-radius: var(--radius);
  padding: 12px 12px 2px; margin-bottom: 10px; background: var(--bg-elevated); box-shadow: 0 2px 6px rgba(0, 0, 0, 0.18);
}
.superset-label {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--amber);
  text-transform: uppercase; letter-spacing: 0.06em; margin: 0 0 8px 2px;
}
.superset-group .exercise-row { background: var(--surface); margin-bottom: 8px; box-shadow: none; }
.superset-group .exercise-row.superset-first { margin-bottom: 8px; }
.row-flex { display: flex; gap: 12px; align-items: flex-start; }
.media-col { display: flex; flex-direction: column; align-items: center; gap: 0; flex-shrink: 0; width: 76px; }
.thumb { width: 76px; height: 76px; border-radius: 10px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border-soft); background: var(--surface-2); }
.thumb-placeholder { display: flex; align-items: center; justify-content: center; color: var(--text-faint); }
.warmup-item .thumb { width: 56px; height: 56px; border-radius: 8px; }
.content-col { flex: 1; min-width: 0; }

.name-line { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
.order-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--bg); background: var(--cyan);
  border-radius: 4px; padding: 2px 6px; flex-shrink: 0;
}
.content-col h4 { margin: 0; font-size: 15px; font-weight: 600; line-height: 1.3; }

.target-badge {
  display: inline-block; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--amber);
  border: 1px solid var(--amber); border-radius: 4px; padding: 2px 7px; margin-top: 7px;
}
.prescription { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); margin: 7px 0 0; }
.status-block { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
.status-row { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
.status-label { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint); text-transform: uppercase; letter-spacing: 0.06em; flex-shrink: 0; }
.status-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; text-align: right; }
.status-value.baseline { color: var(--text-muted); }
.status-value.current { color: var(--success); font-weight: 600; }
.status-date { color: var(--text-faint); font-weight: 400; }

.history-toggle { margin: 8px 0 0; font-size: 12px; color: var(--cyan); background: none; border: none; padding: 0; }
.history-toggle:focus-visible { outline: 2px solid var(--cyan); }
.history-list { margin: 8px 0 0; padding-top: 8px; border-top: 1px dashed var(--border); display: flex; flex-direction: column; gap: 5px; }
.history-list .row { display: flex; justify-content: space-between; gap: 10px; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-muted); }
.history-list .row span:last-child { text-align: right; }


.set-rows { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
.set-row { display: flex; align-items: center; gap: 8px; }
.set-row .set-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text-faint); width: 16px; flex-shrink: 0; text-align: center; }
.set-row .x { color: var(--text-faint); font-size: 13px; flex-shrink: 0; }
.set-input-wrap { display: flex; flex-direction: column; flex: 1; min-width: 0; }
.set-prev { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-faint); padding: 0 2px 2px; }
.set-row input {
  flex: 1; min-width: 0; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: var(--radius-sm);
  color: var(--text); padding: 10px; font-family: 'JetBrains Mono', monospace; font-size: 14px;
}
.set-row input::placeholder { color: var(--text-faint); }
.set-row input:focus-visible { outline: 2px solid var(--cyan); }

.log-bar { position: sticky; bottom: 0; padding: 14px 16px; margin: 20px -16px 0; background: linear-gradient(to top, var(--bg) 65%, transparent); }
.btn-row { display: flex; gap: 8px; }
.btn-primary {
  width: 100%; background: var(--amber); color: #0B1220; border: none; border-radius: var(--radius-sm);
  padding: 14px; font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 600;
  letter-spacing: 0.04em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-primary:disabled { opacity: 0.6; }
.btn-primary:focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }
.btn-secondary {
  width: 100%; background: transparent; color: var(--text-muted); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px; font-family: 'Inter', sans-serif; font-size: 14px;
}
.btn-secondary:focus-visible { outline: 2px solid var(--cyan); }

.warmup-list { display: flex; flex-direction: column; gap: 10px; }
.warmup-intro { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; }
.warmup-item { display: flex; gap: 12px; align-items: center; background: var(--surface); border: 1px solid var(--border-soft); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 8px; }
.warmup-item .order-tag { background: var(--amber); }
.warmup-item span:last-child { font-size: 14px; }

.loading-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; font-size: 13px; }

.stamp {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  background: var(--success); color: #0B1220; font-family: 'Inter', sans-serif; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; padding: 10px 18px; border-radius: var(--radius-sm);
  font-size: 13px; z-index: 30;
}
@media (prefers-reduced-motion: no-preference) {
  .stamp { animation: stampIn 1.4s ease forwards; }
}
@keyframes stampIn {
  0% { opacity: 0; transform: translateX(-50%) scale(0.7) rotate(-6deg); }
  15% { opacity: 1; transform: translateX(-50%) scale(1.05) rotate(-2deg); }
  25% { transform: translateX(-50%) scale(1) rotate(0deg); }
  80% { opacity: 1; }
  100% { opacity: 0; }
}
